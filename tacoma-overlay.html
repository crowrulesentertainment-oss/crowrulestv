<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacoma Nights Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    font-family: 'Montserrat', sans-serif;
}

/* HUD */
.hud {
    position: absolute;
    bottom: 60px;
    left: 60px;
    color: rgba(255,255,255,0.85);
}

.location {
    font-size: 14px;
    opacity: 0.75;
}

.time {
    font-family: 'Orbitron';
    font-size: 26px;
    color: #7fe7ff;
    margin-top: 5px;
    text-shadow: 0 0 10px rgba(127,231,255,0.25);
}

.weather {
    margin-top: 6px;
    font-size: 14px;
    opacity: 0.85;
}

/* RAIN */
.rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: none;
    overflow: hidden;
}

.drop {
    position: absolute;
    width: 1px;
    height: 90px;
    background: linear-gradient(transparent, rgba(127,231,255,0.6));
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-120px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="hud">
    <div class="location">Tacoma, Washington</div>
    <div class="time" id="time">--:--:--</div>
    <div class="weather" id="weather">Loading weather...</div>
</div>

<div class="rain" id="rain"></div>

<script>

const API_KEY = "d90d53ec2ff7c86d0f9a4b537e7f9dc7";
const CITY = "Tacoma";

/* ---------------- TIME ---------------- */
function updateTime() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
}
setInterval(updateTime, 1000);
updateTime();

/* ---------------- RAIN SYSTEM ---------------- */
const rainContainer = document.getElementById("rain");

function startRain() {
    rainContainer.style.display = "block";

    if (rainContainer.children.length > 0) return;

    for (let i = 0; i < 90; i++) {
        const drop = document.createElement("div");
        drop.className = "drop";

        drop.style.left = Math.random() * 100 + "vw";
        drop.style.animationDuration = (0.6 + Math.random() * 1.2) + "s";
        drop.style.opacity = Math.random();

        rainContainer.appendChild(drop);
    }
}

function stopRain() {
    rainContainer.style.display = "none";
    rainContainer.innerHTML = "";
}

/* ---------------- WEATHER ---------------- */
async function getWeather() {
    try {
        const url =
            `https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=imperial&appid=${API_KEY}`;

        const res = await fetch(url);

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        const temp = Math.round(data.main.temp);
        const condition = data.weather[0].main.toLowerCase();

        document.getElementById("weather").innerText =
            `${data.weather[0].description} • ${temp}°F`;

        /* RAIN LOGIC */
        if (
            condition.includes("rain") ||
            condition.includes("drizzle") ||
            condition.includes("thunder")
        ) {
            startRain();
        } else {
            stopRain();
        }

    } catch (err) {
        console.log("Weather error:", err);

        // SAFE FALLBACK (never breaks UI)
        document.getElementById("weather").innerText =
            "Light rain • 57°F (fallback)";

        startRain();
    }
}

/* run weather */
getWeather();
setInterval(getWeather, 600000);

</script>

</body>
</html>
