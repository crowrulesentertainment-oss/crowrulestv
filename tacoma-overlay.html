<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacoma Nights Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    font-family: 'Montserrat', sans-serif;
}

.hud {
    position: absolute;
    bottom: 60px;
    left: 60px;
    color: rgba(255,255,255,0.85);
}

.location {
    font-size: 14px;
    opacity: 0.7;
}

.time {
    font-family: 'Orbitron';
    font-size: 26px;
    color: #7fe7ff;
    margin-top: 5px;
}

.weather {
    margin-top: 6px;
    font-size: 14px;
    opacity: 0.85;
}

/* RAIN */
.rain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: none;
}

.drop {
    position: absolute;
    width: 1px;
    height: 90px;
    background: linear-gradient(transparent, rgba(127,231,255,0.6));
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-120px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0; }
}

/* ERROR STATE (IMPORTANT) */
.error {
    color: #ff6b6b;
}
</style>
</head>

<body>

<div class="hud">
    <div class="location">Tacoma, Washington</div>
    <div class="time" id="time">--:--:--</div>
    <div class="weather" id="weather">Loading weather...</div>
</div>

<div class="rain" id="rain"></div>

<script>

const API_KEY = "d90d53ec2ff7c86d0f9a4b537e7f9dc7";
const CITY = "Tacoma";
const UNITS = "imperial";

const weatherEl = document.getElementById("weather");
const rainEl = document.getElementById("rain");

/* ---------------- TIME ---------------- */
function updateTime() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
}
setInterval(updateTime, 1000);
updateTime();

/* ---------------- RAIN ---------------- */
function startRain() {
    rainEl.style.display = "block";

    if (rainEl.children.length > 0) return;

    for (let i = 0; i < 100; i++) {
        const drop = document.createElement("div");
        drop.className = "drop";

        drop.style.left = Math.random() * 100 + "vw";
        drop.style.animationDuration = (0.5 + Math.random() * 1.2) + "s";
        drop.style.opacity = Math.random();

        rainEl.appendChild(drop);
    }
}

function stopRain() {
    rainEl.style.display = "none";
    rainEl.innerHTML = "";
}

/* ---------------- WEATHER (REAL + NO FAKE FALLBACK) ---------------- */
async function getWeather() {
    try {
        const url =
            `https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=${UNITS}&appid=${API_KEY}`;

        const res = await fetch(url);

        // HARD FAILURE HANDLING
        if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text}`);
        }

        const data = await res.json();

        if (!data.weather || !data.main) {
            throw new Error("Invalid API response structure");
        }

        const temp = Math.round(data.main.temp);
        const condition = data.weather[0].main.toLowerCase();
        const description = data.weather[0].description;

        weatherEl.classList.remove("error");
        weatherEl.innerText = `${description} • ${temp}°F`;

        // Rain logic (ONLY REAL DATA)
        if (
            condition.includes("rain") ||
            condition.includes("drizzle") ||
            condition.includes("thunderstorm")
        ) {
            startRain();
        } else {
            stopRain();
        }

    } catch (err) {
        console.error("WEATHER ERROR:", err);

        // REAL ERROR DISPLAY (NOT FAKE WEATHER)
        weatherEl.classList.add("error");
        weatherEl.innerText = "Weather unavailable (check API / connection)";

        stopRain();
    }
}

getWeather();
setInterval(getWeather, 600000);

</script>

</body>
</html>
