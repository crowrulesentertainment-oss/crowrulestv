<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Live Esports Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#000;
    --panel:#0f0f0f;
    --cyan:#00ffff;
    --green:#00ff88;
    --gold:#ffd700;
    --red:#ff3333;
    --text:#fff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    font-family:Montserrat,sans-serif;
    color:var(--text);
    overflow:hidden;
}

/* LIVE BADGE */
.live{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:var(--red);
    padding:8px 18px;
    border-radius:30px;
    font-weight:bold;
    letter-spacing:2px;
    font-size:14px;
}

/* MAIN PANEL */
.panel{
    position:absolute;
    top:60px;
    left:20px;
    width:520px;
    background:rgba(10,10,10,0.92);
    border:1px solid var(--cyan);
    border-radius:14px;
    overflow:hidden;
    backdrop-filter: blur(8px);
}

/* HEADER */
.header{
    text-align:center;
    padding:12px;
    font-family:Orbitron;
    color:var(--cyan);
    background:#111;
    font-size:16px;
}

/* TABS */
.tabs{
    display:flex;
    border-bottom:1px solid #222;
}

.tab{
    flex:1;
    padding:10px;
    background:#111;
    border:none;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
    font-size:12px;
    transition:0.2s;
}

.tab:hover{
    background:var(--cyan);
    color:#000;
}

.tab.active{
    background:var(--cyan);
    color:#000;
}

/* LIST */
.list{
    height:600px;
    overflow-y:auto;
}

.list::-webkit-scrollbar{
    width:6px;
}

.list::-webkit-scrollbar-thumb{
    background:var(--cyan);
    border-radius:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:13px;
}

.rank{
    width:35px;
    color:var(--gold);
    font-weight:bold;
}

.name{
    flex:1;
}

.points{
    width:80px;
    text-align:right;
    color:var(--cyan);
    font-weight:bold;
}

/* TOP COLORS */
.list .row:nth-child(1){color:gold;font-weight:bold;}
.list .row:nth-child(2){color:silver;}
.list .row:nth-child(3){color:#cd7f32;}

.hidden{display:none;}

footer{
    position:absolute;
    bottom:10px;
    right:20px;
    font-size:11px;
    color:#555;
}
</style>
</head>

<body>

<div class="live">🔴 CROWRULES LIVE LEADERBOARDS</div>

<div class="panel">

<div class="header">ESPORTS SEASON CONTROL HUB</div>

<div class="tabs">
<button class="tab active" onclick="show('dandy', event)">Dandy's World</button>
<button class="tab" onclick="show('toons', event)">Toons Universe</button>
<button class="tab" onclick="show('twilight', event)">Twilight's Zone</button>
<button class="tab" onclick="show('outlaster', event)">Outlaster</button>
</div>

<!-- LEADERBOARDS -->
<div id="dandy" class="list"></div>
<div id="toons" class="list hidden"></div>
<div id="twilight" class="list hidden"></div>
<div id="outlaster" class="list hidden"></div>

</div>

<footer>Auto-updating JSON Leaderboard System</footer>

<script>

/* -------------------------
   DATA FROM JSON
--------------------------*/
let data = {};

/* -------------------------
   FETCH JSON LIVE
--------------------------*/
async function fetchData(){
    try{
        const res = await fetch("leaderboard.json?cache=" + Date.now());
        data = await res.json();
        renderAll();
    }catch(err){
        console.log("JSON load failed", err);
    }
}

/* -------------------------
   RENDER GAME
--------------------------*/
function render(game){
    const container = document.getElementById(game);
    container.innerHTML = "";

    let list = (data[game] || [])
        .sort((a,b)=>b.points - a.points);

    list.forEach((p,i)=>{
        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
            <div class="rank">${i+1}</div>
            <div class="name">${p.name}</div>
            <div class="points">${p.points}</div>
        `;

        container.appendChild(row);
    });
}

/* -------------------------
   RENDER ALL
--------------------------*/
function renderAll(){
    render("dandy");
    render("toons");
    render("twilight");
    render("outlaster");
}

/* -------------------------
   TAB SWITCHING
--------------------------*/
function show(id, event){
    document.querySelectorAll(".list").forEach(l=>l.classList.add("hidden"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById(id).classList.remove("hidden");
    event.target.classList.add("active");
}

/* -------------------------
   AUTO REFRESH LOOP
--------------------------*/
fetchData();
setInterval(fetchData, 3000);

</script>

</body>
</html>
