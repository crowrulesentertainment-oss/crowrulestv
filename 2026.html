<html lang="en">

<meta charset="UTF-8">

<title>CrowRules Live Admin Overlay System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:transparent;
    font-family:Montserrat,sans-serif;
    color:white;
    overflow:hidden;
}

/* LIVE TAG */
.live{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    padding:8px 16px;
    border-radius:20px;
    font-weight:bold;
    letter-spacing:2px;
}

/* ADMIN PANEL */
.admin{
    position:absolute;
    right:20px;
    top:10px;
    width:300px;
    background:rgba(0,0,0,.85);
    border:1px solid #00ffff;
    border-radius:12px;
    padding:12px;
}

.admin h3{
    font-family:Orbitron;
    color:#00ffff;
    margin:0 0 10px 0;
    text-align:center;
}

input,select{
    width:100%;
    margin:5px 0;
    padding:8px;
    border-radius:6px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.add{background:#00ff88;}
.remove{background:#ff3333;color:white;}

/* PANELS */
.panel{
    position:absolute;
    left:20px;
    top:60px;
    width:420px;
    background:rgba(10,10,10,.9);
    border:1px solid #00ffff;
    border-radius:12px;
    overflow:hidden;
}

.header{
    text-align:center;
    padding:10px;
    font-family:Orbitron;
    color:#00ffff;
    background:#111;
}

/* TABS */
.tabs{
    display:flex;
}

.tab{
    flex:1;
    padding:8px;
    cursor:pointer;
    background:#111;
    border:none;
    color:white;
}

.tab.active{
    background:#00ffff;
    color:black;
}

/* LIST */
.list{
    height:620px;
    overflow-y:auto;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 10px;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:12px;
}

.rank{width:30px;color:gold;font-weight:bold;}
.name{flex:1;}
.points{width:80px;text-align:right;color:#00ffff;}

/* HIDE */
.hidden{display:none;}

</style>
</head>

<div class="live">🔴 LIVE CROWRULES CONTROL SYSTEM</div>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>ADMIN CONTROL</h3>

<select id="game">
<option value="dandy">Dandy's World</option>
<option value="toons">Toons Universe</option>
<option value="twilight">Twilight's Zone</option>
<option value="outlaster">Outlaster</option>
</select>

<input id="player" placeholder="Player Name">
<input id="points" placeholder="Points">

<button class="add" onclick="addPoints()">+ ADD POINTS</button>
<button class="remove" onclick="removePoints()">- REMOVE POINTS</button>

</div>

<!-- LEADERBOARD PANEL -->
<div class="panel">

<div class="header">LIVE LEADERBOARDS (AUTO SORT)</div>

<div class="tabs">
<button class="tab active" onclick="show('dandy')">Dandy</button>
<button class="tab" onclick="show('toons')">Toons</button>
<button class="tab" onclick="show('twilight')">Twilight</button>
<button class="tab" onclick="show('outlaster')">Outlaster</button>

/* -------------------------
   RENDER FUNCTION (AUTO SORT)
--------------------------*/

function render(game){
let container = document.getElementById(game);
container.innerHTML = "";

/* SORT DESCENDING */
data[game]
.sort((a,b)=>b[1]-a[1])
.forEach((p,i)=>{
let row = document.createElement("div");
row.className="row";

row.innerHTML = `
<div class="rank">${i+1}</div>
<div class="name">${p[0]}</div>
<div class="points">${p[1]}</div>
`;

container.appendChild(row);
});
}

/* RENDER ALL */
function renderAll(){
render("dandy");
render("toons");
render("twilight");
render("outlaster");
}

/* -------------------------
   ADMIN FUNCTIONS
--------------------------*/

function addPoints(){
let g = document.getElementById("game").value;
let name = document.getElementById("player").value;
let pts = parseInt(document.getElementById("points").value);

let found = data[g].find(p=>p[0]===name);

if(found){
found[1]+=pts;
}else{
data[g].push([name,pts]);
}

save();
renderAll();
}

function removePoints(){
let g = document.getElementById("game").value;
let name = document.getElementById("player").value;
let pts = parseInt(document.getElementById("points").value);

let found = data[g].find(p=>p[0]===name);

if(found){
found[1]-=pts;
if(found[1]<0) found[1]=0;
}

save();
renderAll();
}

/* -------------------------
   TAB SYSTEM
--------------------------*/

function show(id){
document.querySelectorAll('.list').forEach(l=>l.classList.add('hidden'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

document.getElementById(id).classList.remove('hidden');
event.target.classList.add('active');
}

/* -------------------------
   SAVE (LOCAL STORAGE)
--------------------------*/

function save(){
localStorage.setItem("crowrules_leaderboards",JSON.stringify(data));
}

function load(){
let saved = localStorage.getItem("crowrules_leaderboards");
if(saved){
data = JSON.parse(saved);
}
}

/* INIT */
load();
renderAll();
