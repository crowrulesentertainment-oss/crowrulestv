<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Live Control Overlay System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:transparent;
    font-family:Montserrat,sans-serif;
    color:white;
    overflow:hidden;
}

/* LIVE */
.live{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    padding:8px 16px;
    border-radius:20px;
    font-weight:bold;
    letter-spacing:2px;
}

/* ADMIN */
.admin{
    position:absolute;
    right:20px;
    top:10px;
    width:300px;
    background:rgba(0,0,0,.85);
    border:1px solid #00ffff;
    border-radius:12px;
    padding:12px;
}

.admin h3{
    font-family:Orbitron;
    color:#00ffff;
    margin:0 0 10px 0;
    text-align:center;
}

input,select{
    width:100%;
    margin:5px 0;
    padding:8px;
    border-radius:6px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.add{background:#00ff88;}
.remove{background:#ff3333;color:white;}

/* LEADERBOARD PANEL */
.panel{
    position:absolute;
    left:20px;
    top:60px;
    width:420px;
    background:rgba(10,10,10,.92);
    border:1px solid #00ffff;
    border-radius:12px;
    overflow:hidden;
}

.header{
    text-align:center;
    padding:10px;
    font-family:Orbitron;
    color:#00ffff;
    background:#111;
}

/* TABS */
.tabs{
    display:flex;
}

.tab{
    flex:1;
    padding:8px;
    cursor:pointer;
    background:#111;
    border:none;
    color:white;
    font-weight:bold;
}

.tab.active{
    background:#00ffff;
    color:black;
}

/* LIST (FIXED SCROLL) */
.list{
    height:620px;
    overflow-y:auto;
    overflow-x:hidden;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    padding:6px 10px;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:12px;
}

.rank{width:40px;color:gold;font-weight:bold;}
.name{flex:1;}
.points{width:80px;text-align:right;color:#00ffff;}

/* SCROLLBAR (OBS FRIENDLY) */
.list::-webkit-scrollbar{
    width:6px;
}
.list::-webkit-scrollbar-thumb{
    background:#00ffff;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="live">🔴 LIVE CROWRULES CONTROL SYSTEM</div>

<!-- ADMIN -->
<div class="admin">
<h3>ADMIN CONTROL</h3>

<select id="game">
<option value="dandy">Dandy's World</option>
<option value="toons">Toons Universe</option>
<option value="twilight">Twilight's Zone</option>
<option value="outlaster">Outlaster</option>
</select>

<input id="player" placeholder="Player Name">
<input id="points" type="number" placeholder="Points">

<button class="add" onclick="addPoints()">+ ADD POINTS</button>
<button class="remove" onclick="removePoints()">- REMOVE POINTS</button>
</div>

<!-- PANEL -->
<div class="panel">
<div class="header">LIVE LEADERBOARDS (AUTO SORT)</div>

<div class="tabs">
<button class="tab active" data-tab="dandy">Dandy</button>
<button class="tab" data-tab="toons">Toons</button>
<button class="tab" data-tab="twilight">Twilight</button>
<button class="tab" data-tab="outlaster">Outlaster</button>
</div>

<div id="dandy" class="list"></div>
<div id="toons" class="list" style="display:none;"></div>
<div id="twilight" class="list" style="display:none;"></div>
<div id="outlaster" class="list" style="display:none;"></div>
</div>

/* =========================
   RENDER
========================= */
function render(game){
const container = document.getElementById(game);
container.innerHTML = "";

data[game]
.sort((a,b)=>b[1]-a[1])
.forEach((p,i)=>{
const row = document.createElement("div");
row.className = "row";

row.innerHTML = `
<div class="rank">${i+1}</div>
<div class="name">${p[0]}</div>
<div class="points">${p[1]}</div>
`;

container.appendChild(row);
});
}

function renderAll(){
render("dandy");
render("toons");
render("twilight");
render("outlaster");
}

/* =========================
   ADMIN FIXED
========================= */
function addPoints(){
updatePoints(1);
}

function removePoints(){
updatePoints(-1);
}

function updatePoints(mult){
const g = document.getElementById("game").value;
const name = document.getElementById("player").value.trim();
const pts = parseInt(document.getElementById("points").value);

if(!name || isNaN(pts)) return;

let found = data[g].find(p => p[0] === name);

if(found){
found[1] += pts * mult;
if(found[1] < 0) found[1] = 0;
} else if(mult > 0){
data[g].push([name, pts]);
}

save();
renderAll();
}

/* =========================
   TAB FIX (NO event bug)
========================= */
document.querySelectorAll(".tab").forEach(btn=>{
btn.addEventListener("click", ()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
btn.classList.add("active");

document.querySelectorAll(".list").forEach(l=>l.style.display="none");
document.getElementById(btn.dataset.tab).style.display="block";
});
});

/* =========================
   SAVE / LOAD
========================= */
function save(){
localStorage.setItem("crowrules_leaderboards", JSON.stringify(data));
}

function load(){
const saved = localStorage.getItem("crowrules_leaderboards");
if(saved) data = JSON.parse(saved);
}

/* INIT */
load();
renderAll();
document.getElementById("dandy").style.display = "block";

</script>

</html>
