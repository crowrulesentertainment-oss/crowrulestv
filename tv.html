<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrowRules TV | Live Network</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:80px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:25px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    letter-spacing:2px;
}

.nav-dot{
    width:10px;height:10px;border-radius:50%;
    background:#00ffff;opacity:0.5;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.2);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;}

.content{display:flex;flex:1;}

/* PLAYER */
.player{
    flex:2;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.screen{
    width:95%;
    height:88%;
    border-radius:20px;
    border:2px solid rgba(0,255,255,0.2);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* VIDEO */
.video{
    flex:1;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* INFO BAR */
.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.2);
}

.info h2{color:#00ffff;font-size:18px;}
.info p{opacity:0.8;font-size:13px;margin-top:5px;}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

button{
    background:rgba(0,255,255,0.1);
    border:1px solid rgba(0,255,255,0.3);
    color:#00ffff;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:rgba(0,255,255,0.2);
}

/* CHANNELS */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.2);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.15);
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{background:rgba(0,255,255,0.08);}
.channel.active{border-color:#00ffff;}

.channel h4{color:#00ffff;}
.channel p{font-size:12px;opacity:0.7;margin-top:5px;}

.video-list{
    margin-top:8px;
    font-size:11px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<div class="main">

<div class="topbar">
<div class="live">● LIVE</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<!-- PLAYER -->
<div class="player">

<div class="screen">

<div class="video">
<iframe id="video"
src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1"
allow="autoplay; encrypted-media"
allowfullscreen></iframe>
</div>

<div class="info">
<h2 id="title">Tacoma Nights</h2>
<p id="desc">Flagship talk show from Tacoma, WA</p>

<div class="controls">
<button onclick="prevVideo()">⟵ Prev</button>
<button onclick="nextVideo()">Next ⟶</button>
</div>

</div>

</div>

</div>

<!-- CHANNELS -->
<div class="channels" id="channelList"></div>

</div>

</div>

</div>

<script>

/* CLOCK */
function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

/* CHANNEL DATA (MULTI-VIDEO SUPPORT) */
const channels = {
"Tacoma Nights": {
desc:"Flagship talk show from Tacoma, WA",
videos:["dQw4w9WgXcQ","kJQP7kiw5Fk","3JZ_D3ELwOQ"],
index:0
},
"Talk Radio": {
desc:"Live discussion & call-in style talk show",
videos:["JkoTW5nNXLg","sgmxBU9y6A4","J3SkM_WAdLo"],
index:0
},
"D&J Show": {
desc:"Comedy / discussion / variety show",
videos:["vT-BRFf2Yk0","bo-fv8gLU1U","x4W80w1wCZM"],
index:0
},
"Game Night Live": {
desc:"Gaming & live streams",
videos:["R_es3EtUbOY","Dp351ijRrM8","sbQc9zTn9oc"],
index:0
},
"Bonded in Mystery": {
desc:"True crime investigations",
videos:["eVTXPUF4Oz4","ktvTqknDobU","hTWKbfoikeg"],
index:0
},
"Voices From The Void": {
desc:"Horror storytelling",
videos:["kJQP7kiw5Fk","eY52Zsg-KVI","CevxZvSJLk8"],
index:0
}
};

let currentChannel = "Tacoma Nights";

/* RENDER CHANNEL LIST */
function renderChannels(){
const container = document.getElementById("channelList");
container.innerHTML = "";

Object.keys(channels).forEach(name=>{
const ch = channels[name];

const div = document.createElement("div");
div.className="channel" + (name===currentChannel?" active":"");

div.innerHTML = `
<h4>${name}</h4>
<p>${ch.desc}</p>
<div class="video-list">Videos: ${ch.videos.length}</div>
`;

div.onclick=()=>switchChannel(name);

container.appendChild(div);
});
}
renderChannels();

/* SWITCH CHANNEL */
function switchChannel(name){
currentChannel = name;
channels[name].index = 0;

document.getElementById("title").innerText = name;
document.getElementById("desc").innerText = channels[name].desc;

loadVideo();

renderChannels();
}

/* LOAD VIDEO */
function loadVideo(){
const ch = channels[currentChannel];
const vid = ch.videos[ch.index];

document.getElementById("video").src =
`https://www.youtube.com/embed/${vid}?autoplay=1&mute=1`;
}

/* NEXT / PREV */
function nextVideo(){
const ch = channels[currentChannel];
ch.index = (ch.index + 1) % ch.videos.length;
loadVideo();
}

function prevVideo(){
const ch = channels[currentChannel];
ch.index = (ch.index - 1 + ch.videos.length) % ch.videos.length;
loadVideo();
}

</script>

</body>
</html>
