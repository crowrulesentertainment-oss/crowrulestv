<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV | Broadcast Network v9.1 Stable</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:90px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:18px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
}

.nav-dot{width:10px;height:10px;border-radius:50%;background:#00ffff33;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.15);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;font-weight:600}

.content{display:flex;flex:1;}

/* PLAYER */
.player{
    flex:2;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.screen{
    width:95%;
    height:88%;
    border-radius:18px;
    border:2px solid rgba(0,255,255,0.15);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
}

.video{flex:1;position:relative;}
#player{width:100%;height:100%;}

.loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#00ffff;
    font-size:12px;
    letter-spacing:2px;
}

.overlay{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(0,255,255,0.2);
    padding:8px 10px;
    font-size:11px;
    color:#00ffff;
    border-radius:8px;
}

/* INFO */
.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.15);
}

.info h2{color:#00ffff;font-size:16px;}
.info p{opacity:0.75;font-size:13px;margin-top:4px;}
.status{margin-top:6px;font-size:11px;color:#888;}

/* CHANNELS */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.15);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.1);
    cursor:pointer;
}

.channel.active{border-color:#00ffff;}
.small{font-size:12px;opacity:0.7}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="live">● BROADCAST NETWORK</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<!-- PLAYER -->
<div class="player">
<div class="screen">

<div class="video">
<div id="player"></div>

<div class="loading" id="loading">INITIALIZING BROADCAST SYSTEM...</div>

<div class="overlay">
NOW: <span id="now"></span><br>
NEXT: <span id="next"></span>
</div>

</div>

<div class="info">
<h2 id="title">Loading...</h2>
<p id="desc"></p>
<div class="status" id="status"></div>
</div>

</div>
</div>

<!-- CHANNEL LIST -->
<div class="channels" id="channels"></div>

</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ================= CLOCK ================= */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* ================= CHANNEL DATA (UNCHANGED VIDEOS) ================= */
const channels = {

/* ===== 1. D&J SHOW ===== */
"D&J Show":{
desc:"Comedy variety",
videos:[
{id:"vT-BRFf2Yk0", title:"D&J Show — Episode #1"},
{id:"bo-fv8gLU1U", title:"D&J Show — Episode #2"},
{id:"x4W80w1wCZM", title:"D&J Show — Episode #3"},
{id:"Skdnn5cERuo", title:"D&J Show — Episode #4"},
{id:"6wsqHTc6Rl0", title:"D&J Show — Episode #5"},
{id:"7Z9--D8PLV8", title:"D&J Show — Episode #6"},
{id:"Ci_GVzgq2Go", title:"D&J Show — Episode #7"},
{id:"FE8wFPuMJPg", title:"D&J Show — Episode #8"},
{id:"wYnGU5XTwAA", title:"D&J Show — Episode #9"},
{id:"rrLKkjEdVSw", title:"D&J Show — Episode #10"}
],
index:0
},

/* ===== 2. TALK RADIO ===== */
"Talk Radio":{
desc:"Live discussion show",
videos:[
{id:"JkoTW5nNXLg", title:"Talk Radio — Episode #1"},
{id:"sgmxBU9y6A4", title:"Talk Radio — Episode #2"},
{id:"J3SkM_WAdLo", title:"Talk Radio — Episode #3"},
{id:"uzb9N9exc7k", title:"Talk Radio — Episode #4"},
{id:"wVIMzr02YQg", title:"Talk Radio — Episode #5"},
{id:"lbuX1NST_WI", title:"Talk Radio — Episode #6"},
{id:"gX-4M0M8ax8", title:"Talk Radio — Episode #7"},
{id:"rzBtb7U-jtg", title:"Talk Radio — Episode #8"},
{id:"OeybM6vTSRo", title:"Talk Radio — Episode #9"},
{id:"ZJ4EH6ZLEwU", title:"Talk Radio — Episode #10"}
],
index:0
},

/* ===== 3. TACOMA NIGHTS ===== */
"Tacoma Nights":{
desc:"Flagship talk show",
videos:[
{id:"YXcW0pN3KrE", title:"Tacoma Nights — Trailer"},
{id:"KQKBhSZrXd4", title:"Back Deck Fireworks Live"},
{id:"uTvqIQjsxII", title:"Tacoma Nights Episode 1 – My Life & My Story | The Beginning"}   
],
index:0
}

};

/* ================= STATE ================= */
const state = {
channel:"D&J Show",
player:null,
ready:false
};

/* ================= HELPERS ================= */
function currentChannel(){
return channels[state.channel];
}

function currentVideo(){
const ch = currentChannel();
return ch.videos[ch.index];
}

/* ================= CLOCK ================= */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* ================= YT INIT ================= */
function onYouTubeIframeAPIReady(){
state.player = new YT.Player("player",{
videoId:currentVideo().id,
playerVars:{
autoplay:1,
mute:1,
controls:1,
rel:0
},
events:{
onReady:()=>{
state.ready = true;
setLoading(false);
render();
updateUI();
updateOverlay();
state.player.playVideo();
},
onStateChange:onState
}
});

setLoading(true);
}

/* ================= LOADING ================= */
function setLoading(v){
document.getElementById("loading").style.display = v ? "flex" : "none";
}

/* ================= LOAD VIDEO ================= */
function loadVideo(){
if(!state.ready) return;

setLoading(true);
state.player.loadVideoById(currentVideo().id);

setTimeout(()=>setLoading(false),400);

updateUI();
updateOverlay();
}

/* ================= NEXT ================= */
function next(){
const ch = currentChannel();
ch.index = (ch.index + 1) % ch.videos.length;
loadVideo();
}

/* ================= CHANNEL SWITCH ================= */
function setChannel(name){
state.channel = name;
channels[name].index = 0;
loadVideo();
render();
}

/* ================= OVERLAY ================= */
function updateOverlay(){
const ch = currentChannel();

document.getElementById("now").innerText =
currentVideo().title;

document.getElementById("next").innerText =
ch.videos[(ch.index+1)%ch.videos.length].title;
}

/* ================= UI ================= */
function updateUI(){
document.getElementById("title").innerText = currentVideo().title;
document.getElementById("desc").innerText = currentChannel().desc;
document.getElementById("status").innerText =
"NETWORK ONLINE • BROADCAST ENGINE ACTIVE";
}

/* ================= CHANNEL RENDER ================= */
function render(){
const box = document.getElementById("channels");
box.innerHTML="";

Object.keys(channels).forEach(name=>{
const el = document.createElement("div");
el.className = "channel" + (name===state.channel?" active":"");

el.innerHTML = `<b>${name}</b><div class="small">${channels[name].desc}</div>`;
el.onclick = ()=>setChannel(name);

box.appendChild(el);
});
}

/* ================= AUTO NEXT ================= */
function onState(e){
if(e.data === YT.PlayerState.ENDED){
next();
}
}

</script>

</body>
</html>
