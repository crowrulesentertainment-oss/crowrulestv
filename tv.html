<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Control Room Dashboard</title>

<style>
:root{
    --bg:#000;
    --panel:#0b0b0b;
    --accent:#00ffff;
    --danger:#ff2d2d;
    --text:#fff;
    --muted:#aaa;
    --border:#1f1f1f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* LAYOUT */
.container{
    display:flex;
    height:100vh;
}

/* CONTROL ROOM */
.dashboard{
    width:360px;
    background:#070707;
    border-right:1px solid var(--border);
    padding:15px;
    overflow-y:auto;
}

.section{
    margin-bottom:20px;
    padding:10px;
    background:#0c0c0c;
    border:1px solid #1a1a1a;
    border-radius:8px;
}

h2{
    font-size:14px;
    color:var(--accent);
    margin-bottom:10px;
}

/* BUTTONS */
.btn{
    display:block;
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#1a1a1a;
    border:none;
    color:#fff;
    cursor:pointer;
    border-radius:6px;
    text-align:left;
}

.btn:hover{
    background:#222;
}

.btn.active{
    border-left:4px solid var(--accent);
}

/* PLAYER SIDE */
.viewer{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
}

/* VIDEO */
.video{
    flex:1;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
    padding:20px;
}

.title{
    font-size:22px;
    margin-bottom:5px;
}

.desc{
    color:var(--muted);
    font-size:14px;
}

/* STATUS BAR */
.status{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
}

.badge{
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
}

.live{ background:var(--danger); }
.accent{ background:var(--accent); color:#000; }

/* NOW NEXT */
.info{
    margin-top:10px;
    font-size:12px;
    color:#ccc;
}

/* CLOCK */
.clock{
    position:absolute;
    top:10px;
    right:10px;
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- CONTROL ROOM -->
<div class="dashboard">

    <div class="section">
        <h2>📺 LIVE CHANNELS</h2>
        <button class="btn" onclick="setChannel('talk')">🎙 Talk Radio</button>
        <button class="btn" onclick="setChannel('gaming')">🎮 Game Night</button>
        <button class="btn" onclick="setChannel('dj')">🎧 DJ Block</button>
        <button class="btn" onclick="setChannel('mystery')">🕵 Mystery</button>
        <button class="btn" onclick="setChannel('tacoma')">🌃 Tacoma Nights</button>
    </div>

    <div class="section">
        <h2>🎙 TALK RADIO CONTROL</h2>
        <button class="btn" onclick="playlistPrev()">⏮ Previous Segment</button>
        <button class="btn" onclick="playlistNext()">⏭ Next Segment</button>
    </div>

    <div class="section">
        <h2>⚡ BROADCAST MODE</h2>
        <button class="btn" onclick="setMode('auto')">🤖 AUTO SCHEDULE</button>
        <button class="btn" onclick="setMode('manual')">🎛 MANUAL OVERRIDE</button>
    </div>

</div>

<!-- VIEWER -->
<div class="viewer">

    <div class="status">
        <div class="badge live">🔴 LIVE</div>
        <div class="badge accent" id="modeBadge">AUTO</div>
    </div>

    <div class="clock" id="clock"></div>

    <div class="video">
        <iframe id="player"></iframe>
    </div>

    <div class="overlay">
        <div class="title" id="title">Initializing...</div>
        <div class="desc" id="desc">CrowRules Broadcast System loading</div>

        <div class="info">
            NOW: <span id="now"></span><br>
            NEXT: <span id="next"></span><br>
            BLOCK: <span id="block"></span>
        </div>
    </div>

</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles"});
},1000);

/* STATE */
let mode = "auto";
let currentChannel = "talk";

/* TALK PLAYLIST ENGINE */
const talk = {
    index:0,
    list:[
        {
            name:"Main Talk Feed",
            desc:"Core conversations",
            url:"https://www.youtube.com/embed/videoseries?list=PLXptfWTKLcCu_lTbNegjLUDVSY4TUTB9e&autoplay=1&mute=1"
        },
        {
            name:"Caregiver Stories",
            desc:"Family life stories",
            url:"https://www.youtube.com/embed/videoseries?list=PLXptfWTKLcCvlG38PUlghfql_IHqE5L6P&autoplay=1&mute=1"
        },
        {
            name:"Late Night Talk",
            desc:"Night reflection",
            url:"https://www.youtube.com/embed/videoseries?list=PLXptfWTKLcCtqf79j-tkFM_lysVX_9knZ&autoplay=1&mute=1"
        }
    ]
};

/* CHANNELS */
const channels = {
talk, gaming:{
    name:"Game Night",
    url:"https://www.youtube.com/embed/videoseries?list=PLXptfWTKLcCvy10wkPZPZySX0w4ryHMun&autoplay=1&mute=1",
    desc:"Gaming chaos"
},
dj:{
    name:"DJ Block",
    url:"https://www.youtube.com/embed/videoseries?list=PLXptfWTKLcCtHV3QupW55wBi2-lO323fE&autoplay=1&mute=1",
    desc:"Music vibes"
},
mystery:{
    name:"Mystery Hour",
    url:"https://www.youtube.com/embed/videoseries?list=PLXXXXXXXX3&autoplay=1&mute=1",
    desc:"Investigations"
},
tacoma:{
    name:"Tacoma Nights",
    url:"https://www.youtube.com/embed/videoseries?list=PLXXXXXXXX4&autoplay=1&mute=1",
    desc:"Cinematic talk"
}
};

/* CONTROL */
function setChannel(ch){
    currentChannel = ch;
    mode = "manual";
    updateUI();
}

function setMode(m){
    mode = m;
    document.getElementById("modeBadge").innerText = m.toUpperCase();
    updateUI();
}

/* PLAYLIST CONTROL */
function playlistNext(){
    talk.index = (talk.index+1) % talk.list.length;
    updateUI();
}

function playlistPrev(){
    talk.index = (talk.index-1+talk.list.length) % talk.list.length;
    updateUI();
}

/* AUTO SCHEDULE */
function getScheduleChannel(){
    const h = new Date().getHours();

    if(h < 6) return "talk";
    if(h < 12) return "talk";
    if(h < 16) return "gaming";
    if(h < 18) return "dj";
    if(h < 22) return "mystery";
    return "talk";
}

/* MASTER ENGINE */
function updateUI(){

let ch = currentChannel;

if(mode === "auto"){
    ch = getScheduleChannel();
}

const c = channels[ch];

if(ch === "talk"){

const item = talk.list[talk.index];
const next = talk.list[(talk.index+1)%talk.list.length];

document.getElementById("player").src = item.url;

document.getElementById("title").innerText =
"Talk Radio — " + item.name;

document.getElementById("desc").innerText = item.desc;

document.getElementById("now").innerText = item.name;
document.getElementById("next").innerText = next.name;
document.getElementById("block").innerText = mode.toUpperCase();

} else {

document.getElementById("player").src = c.url;

document.getElementById("title").innerText = c.name;
document.getElementById("desc").innerText = c.desc;

document.getElementById("now").innerText = c.name;
document.getElementById("next").innerText = "Scheduled Block";
document.getElementById("block").innerText = mode.toUpperCase();

}

}

/* AUTO REFRESH */
setInterval(updateUI, 8000);
updateUI();

</script>

</body>
</html>
