<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrowRules TV | Live Network</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:80px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:25px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    letter-spacing:2px;
}

.nav-dot{
    width:10px;height:10px;border-radius:50%;
    background:#00ffff;opacity:0.5;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.2);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;}

.content{display:flex;flex:1;}

/* PLAYER */
.player{
    flex:2;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.screen{
    width:95%;
    height:88%;
    border-radius:20px;
    border:2px solid rgba(0,255,255,0.2);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* VIDEO */
.video{
    flex:1;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* INFO BAR */
.info{
    padding:15px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.2);
}

.info h2{color:#00ffff;font-size:18px;}
.info p{opacity:0.8;font-size:13px;margin-top:5px;}

/* CHANNELS */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.2);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.15);
    cursor:pointer;
    transition:0.2s;
}

.channel:hover{background:rgba(0,255,255,0.08);}
.channel.active{border-color:#00ffff;}

.channel h4{color:#00ffff;}
.channel p{font-size:12px;opacity:0.7;margin-top:5px;}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="live">● LIVE</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<!-- PLAYER -->
<div class="player">

<div class="screen">

<div class="video">
<iframe id="video"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allow="autoplay; encrypted-media"
allowfullscreen></iframe>
</div>

<div class="info">
<h2 id="title">Tacoma Nights</h2>
<p id="desc">Flagship talk show from Tacoma, WA</p>
</div>

</div>

</div>

<!-- CHANNELS -->
<div class="channels">

<div class="channel active" onclick="switchChannel('Tacoma Nights','Flagship talk show from Tacoma, WA','dQw4w9WgXcQ')">
<h4>Tacoma Nights</h4>
<p>Talk Show</p>
</div>

<div class="channel" onclick="switchChannel('Talk Radio','Live discussion & call-in style talk show','T3lctohkk14')">
<h4>Talk Radio</h4>
<p>Live Radio Show</p>
</div>

<div class="channel" onclick="switchChannel('D&J Show','Comedy / discussion / variety show','AZN8JGVb0-s')">
<h4>D&J Show</h4>
<p>Variety</p>
</div>

<div class="channel" onclick="switchChannel('Game Night Live','Gaming & live streams','Dp351ijRrM8')">
<h4>Game Night Live</h4>
<p>Gaming</p>
</div>

<div class="channel" onclick="switchChannel('Bonded in Mystery','True crime investigations','eVTXPUF4Oz4')">
<h4>Bonded in Mystery</h4>
<p>Podcast</p>
</div>

<div class="channel" onclick="switchChannel('Voices From The Void','Horror storytelling','kJQP7kiw5Fk')">
<h4>Voices From The Void</h4>
<p>Horror Audio</p>
</div>

</div>

</div>

</div>

</div>

<script>

/* CLOCK */
function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

/* CHANNEL SWITCH */
function switchChannel(title,desc,videoId){

document.getElementById("title").innerText=title;
document.getElementById("desc").innerText=desc;

document.getElementById("video").src=
`https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;

}

/* ACTIVE STATE */
document.querySelectorAll(".channel").forEach(el=>{
el.addEventListener("click",()=>{
document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
});
});

</script>

</body>
</html>
