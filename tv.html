<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Stable Broadcast OS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

.layout{
    display:flex;
    height:100vh;
}

/* CONTROL */
.control{
    width:340px;
    background:#0a0a0a;
    border-right:1px solid #222;
    padding:10px;
}

.btn{
    width:100%;
    padding:10px;
    margin:4px 0;
    background:#1a1a1a;
    border:0;
    color:#fff;
    cursor:pointer;
}

/* VIEW */
.viewer{
    flex:1;
    position:relative;
}

/* PLAYER */
#player{
    width:100%;
    height:100%;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
}

.title{ font-size:20px; }
.sub{ font-size:13px; color:#aaa; }

.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff2d2d;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="layout">

<!-- CONTROL -->
<div class="control">

<h3>📡 MODE</h3>
<button class="btn" onclick="setMode('auto')">AUTO NETWORK</button>
<button class="btn" onclick="setMode('manual')">DIRECTOR MODE</button>

<h3>📺 CHANNELS</h3>
<button class="btn" onclick="force('talk')">Talk Radio</button>
<button class="btn" onclick="force('gaming')">Game Night</button>
<button class="btn" onclick="force('dj')">DJ Block</button>
<button class="btn" onclick="force('mystery')">Mystery Hour</button>

<h3>🎬 CONTROL</h3>
<button class="btn" onclick="nextEpisode()">Next Episode</button>
<button class="btn" onclick="restartEpisode()">Restart</button>

</div>

<!-- VIEW -->
<div class="viewer">

<div class="badge">🔴 LIVE</div>

<div class="overlay">
<div class="title" id="title">Booting Broadcast OS...</div>
<div class="sub" id="sub">Initializing system...</div>
</div>

<div id="player"></div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   STATE
========================= */

let player;
let mode = "auto";
let override = null;
let currentId = null;

/* =========================
   CHANNELS
========================= */

const channels = {

talk:{
index:0,
episodes:[
{id:"dQw4w9WgXcQ",t:"Morning Talk",d:"Daily conversations"},
{id:"kxopViU98Xo",t:"Care Stories",d:"Life reflections"},
{id:"3JZ_D3ELwOQ",t:"Night Talk",d:"Late discussion"}
]
},

gaming:{
index:0,
episodes:[
{id:"9bZkp7q19f0",t:"Game Start",d:"Opening match"},
{id:"hTWKbfoikeg",t:"Mid Match",d:"Competitive play"}
]
},

dj:{
index:0,
episodes:[
{id:"vT-BRFf2Yk0",t:"Episode 1",d:"Debut"},
{id:"bo-fv8gLU1U",t:"Episode 2",d:"Episode 2"}
]
},

mystery:{
index:0,
episodes:[
{id:"hTWKbfoikeg",t:"Case 1",d:"Investigation"},
{id:"3fumBcKC6RE",t:"Case 2",d:"Evidence review"}
]
}

};

/* =========================
   SCHEDULER
========================= */

function getChannel(){
if(override) return override;

const h = new Date().getHours();

if(h < 6) return "talk";
if(h < 12) return "talk";
if(h < 16) return "gaming";
if(h < 18) return "dj";
return "mystery";
}

/* =========================
   YOUTUBE API READY
========================= */

function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{
height:"100%",
width:"100%",
videoId:"",
events:{
"onStateChange":onState
}
});

update();

}

/* =========================
   REAL END DETECTION
========================= */

function onState(e){
if(e.data === 0){
nextEpisode();
}
}

/* =========================
   PLAY ENGINE (NO RESTART BUG)
========================= */

function play(id){

if(currentId === id) return; // 🔥 CRITICAL FIX

currentId = id;
player.loadVideoById(id);

}

/* =========================
   NEXT EPISODE
========================= */

function nextEpisode(){

const ch = getChannel();
const c = channels[ch];

c.index = (c.index + 1) % c.episodes.length;

update();

}

/* =========================
   UPDATE ENGINE
========================= */

function update(){

const ch = getChannel();
const c = channels[ch];

const ep = c.episodes[c.index];
const next = c.episodes[(c.index+1)%c.episodes.length];

play(ep.id);

/* UI */
document.getElementById("title").innerText =
ch.toUpperCase() + " — " + ep.t;

document.getElementById("sub").innerText =
ep.d;

}

/* =========================
   CONTROLS
========================= */

function setMode(m){
mode = m;
override = null;
}

function force(ch){
override = ch;
mode = "manual";
update();
}

function restartEpisode(){
update();
}

/* =========================
   LOOP (SAFE UI ONLY)
========================= */

setInterval(update, 5000);

</script>

</body>
</html>
