<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV | Broadcast Engine v6.0</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:90px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:18px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    letter-spacing:2px;
}

.nav-dot{
    width:10px;height:10px;border-radius:50%;
    background:#00ffff33;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.15);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;font-weight:600}

.content{display:flex;flex:1;}

.player{
    flex:2;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.screen{
    width:95%;
    height:88%;
    border-radius:18px;
    border:2px solid rgba(0,255,255,0.15);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.video{flex:1;}
#player{width:100%;height:100%;}

.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.15);
}

.info h2{color:#00ffff;font-size:16px;}
.info p{opacity:0.75;font-size:13px;margin-top:4px;}

.status{
    margin-top:6px;
    font-size:11px;
    color:#888;
}

.controls{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
}

button{
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.25);
    color:#00ffff;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.15);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.1);
    cursor:pointer;
}

.channel.active{border-color:#00ffff;}
.small{font-size:12px;opacity:0.7}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<div class="main">

<div class="topbar">
<div class="live">● LIVE BROADCAST</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<div class="player">
<div class="screen">
<div class="video">
<div id="player"></div>
</div>

<div class="info">
<h2 id="title">Loading...</h2>
<p id="desc"></p>
<div class="status" id="status"></div>

<div class="controls">
<button onclick="prev()">⟵ Prev</button>
<button onclick="next()">Next ⟶</button>
<button onclick="toggleShuffle()">🎲 Shuffle</button>
<button onclick="toggleAuto()">🔁 Auto</button>
</div>

</div>
</div>
</div>

<div class="channels" id="channels"></div>

</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* BUMPERS */
const bumpers = [
"7wtfhZwyrcc",
"Zi_XLOBDo_Y",
"fJ9rUzIMcZQ"
];

/* CHANNELS (UNCHANGED VIDEOS) */
const channels = {
"Tacoma Nights":{
desc:"Flagship talk show",
videos:["YXcW0pN3KrE"],
index:0
},
"Talk Radio":{
desc:"Live discussion show",
videos:[
"JkoTW5nNXLg","sgmxBU9y6A4","J3SkM_WAdLo","uzb9N9exc7k","wVIMzr02YQg",
"lbuX1NST_WI","gX-4M0M8ax8","rzBtb7U-jtg","OeybM6vTSRo","ZJ4EH6ZLEwU"
],
index:0
},
"D&J Show":{
desc:"Comedy variety",
videos:[
"vT-BRFf2Yk0","bo-fv8gLU1U","x4W80w1wCZM","Skdnn5cERuo","6wsqHTc6Rl0"
],
index:0
}
};

const state = {
channel:"Tacoma Nights",
shuffle:false,
auto:true,
player:null,
lastState:null
};

/* INIT */
function onYouTubeIframeAPIReady(){

state.player = new YT.Player("player",{

videoId:getVideo(),

playerVars:{
autoplay:1,
mute:1,
controls:1,
rel:0
},

events:{
onReady:onReady,
onStateChange:onStateChange
}

});

render();
updateUI();
}

/* READY */
function onReady(){
state.player.playVideo();
}

/* GET VIDEO */
function getVideo(){
return channels[state.channel].videos[channels[state.channel].index];
}

/* LOAD */
function load(){
state.player.loadVideoById(getVideo());
updateUI();
}

/* AUTO NEXT */
function onStateChange(e){

state.lastState = e.data;

/* END OF VIDEO */
if(e.data === YT.PlayerState.ENDED){

if(state.shuffle && Math.random() < 0.15){
playBumper();
return;
}

next();
}

/* FIX: AUTO RESUME IF PAUSED IN BACKGROUND */
if(state.auto && e.data === YT.PlayerState.PAUSED){
setTimeout(()=>{
state.player.playVideo();
},1000);
}

}

/* NEXT */
function next(){
const ch = channels[state.channel];
ch.index = (ch.index + 1) % ch.videos.length;
load();
}

/* PREV */
function prev(){
const ch = channels[state.channel];
ch.index = (ch.index - 1 + ch.videos.length) % ch.videos.length;
load();
}

/* CHANNEL SWITCH */
function setChannel(name){
state.channel = name;
channels[name].index = 0;
load();
render();
}

/* BUMPER */
function playBumper(){
const id = bumpers[Math.floor(Math.random()*bumpers.length)];

state.player.loadVideoById(id);

setTimeout(()=>{
next();
},5000);
}

/* RENDER */
function render(){
const box = document.getElementById("channels");
box.innerHTML="";

Object.keys(channels).forEach(name=>{
const el = document.createElement("div");
el.className = "channel" + (name===state.channel?" active":"");

el.innerHTML = `
<b>${name}</b>
<div class="small">${channels[name].desc}</div>
`;

el.onclick = ()=>setChannel(name);
box.appendChild(el);
});
}

/* UI */
function updateUI(){
document.getElementById("title").innerText = state.channel;
document.getElementById("desc").innerText = channels[state.channel].desc;

document.getElementById("status").innerText =
state.auto
? "AUTO MODE: ON (ANTI-PAUSE ACTIVE)"
: "MANUAL MODE";
}

/* CONTROLS */
function toggleShuffle(){
state.shuffle = !state.shuffle;
}

function toggleAuto(){
state.auto = !state.auto;
updateUI();
}

/* EXPOSE */
window.next = next;
window.prev = prev;
window.toggleShuffle = toggleShuffle;
window.toggleAuto = toggleAuto;
window.setChannel = setChannel;

</script>

</body>
</html>
