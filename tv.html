<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Stable Broadcast Engine</title>

<style>
:root{
    --bg:#000;
    --accent:#00ffff;
    --live:#ff2d2d;
    --text:#fff;
    --muted:#aaa;
    --border:#1f1f1f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* CONTROL */
.control{
    width:340px;
    background:#070707;
    border-right:1px solid var(--border);
    padding:12px;
}

.section{
    background:#0c0c0c;
    border:1px solid #1a1a1a;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

h3{
    color:var(--accent);
    font-size:13px;
    margin-bottom:8px;
}

.btn{
    width:100%;
    padding:10px;
    margin:4px 0;
    background:#1a1a1a;
    border:none;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    text-align:left;
}

.btn:hover{ background:#222; }

/* VIEW */
.viewer{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
}

.video{
    flex:1;
}

/* STATUS */
.status{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:8px;
    z-index:10;
}

.badge{
    padding:6px 10px;
    font-size:12px;
    border-radius:6px;
}

.live{ background:var(--live); }
.accent{ background:var(--accent); color:#000; }

/* INFO */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
}

.title{ font-size:20px; }
.desc{ font-size:13px; color:var(--muted); }

iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<div class="container">

<!-- CONTROL -->
<div class="control">

<div class="section">
<h3>📡 MODE</h3>
<button class="btn" onclick="setMode('auto')">🤖 AUTO</button>
<button class="btn" onclick="setMode('manual')">🎛 MANUAL</button>
</div>

<div class="section">
<h3>📺 CHANNELS</h3>
<button class="btn" onclick="force('talk')">🎙 Talk Radio</button>
<button class="btn" onclick="force('gaming')">🎮 Game Night</button>
<button class="btn" onclick="force('dj')">🎧 DJ Block</button>
<button class="btn" onclick="force('mystery')">🕵 Mystery</button>
<button class="btn" onclick="force('tacoma')">🌃 Tacoma</button>
</div>

<div class="section">
<h3>🎬 CONTROL</h3>
<button class="btn" onclick="nextEpisode()">⏭ Next</button>
<button class="btn" onclick="restartEpisode()">🔁 Restart</button>
</div>

</div>

<!-- VIEWER -->
<div class="viewer">

<div class="status">
<div class="badge live">🔴 LIVE</div>
<div class="badge accent" id="mode">AUTO</div>
</div>

<div class="video">
<div id="player"></div>
</div>

<div class="overlay">
<div class="title" id="title">Booting Broadcast...</div>
<div class="desc" id="desc">Loading system</div>
</div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* STATE */
let mode = "auto";
let override = null;
let player;

/* VIDEO BUILDER */
function vid(id){
    return id;
}

/* NETWORK */
const network = {
talk:{
index:0,
episodes:[
{t:"Morning Talk",d:"Daily conversations",id:"dQw4w9WgXcQ"},
{t:"Care Stories",d:"Life experiences",id:"kxopViU98Xo"},
{t:"Night Talk",d:"Late reflections",id:"3JZ_D3ELwOQ"}
]
},
gaming:{
index:0,
episodes:[
{t:"Game Start",d:"Opening chaos",id:"9bZkp7q19f0"},
{t:"Mid Match",d:"Competitive play",id:"hTWKbfoikeg"}
]
},
dj:{
index:0,
episodes:[
{t:"DJ Session",d:"Music block",id:"vT-BRFf2Yk0"},
{t:"DJ Night",d:"Late mix",id:"bo-fv8gLU1U"}
]
},
mystery:{
index:0,
episodes:[
{t:"Case 1",d:"Investigation begins",id:"hTWKbfoikeg"},
{t:"Case 2",d:"Evidence review",id:"3fumBcKC6RE"}
]
},
tacoma:{
index:0,
episodes:[
{t:"Rain City",d:"Atmosphere",id:"YQHsXMglC9A"},
{t:"Night Drive",d:"Cinematic travel",id:"kXYiU_JCYtU"}
]
}
};

/* CHANNEL PICK */
function getChannel(){
if(override) return override;

const h = new Date().getHours();

if(h < 6) return "talk";
if(h < 12) return "talk";
if(h < 16) return "gaming";
if(h < 18) return "dj";
if(h < 22) return "mystery";
return "talk";
}

/* YOUTUBE READY */
function onYouTubeIframeAPIReady(){
player = new YT.Player("player", {
height:"100%",
width:"100%",
videoId:"",
events:{
"onStateChange":onState
}
});

update();
}

/* AUTO ADVANCE (REAL END DETECTION) */
function onState(e){
if(e.data === 0){
nextEpisode();
}
}

/* PLAY */
function play(id){
if(!player) return;
player.loadVideoById(id);
}

/* NEXT */
function nextEpisode(){
const ch = getChannel();
const c = network[ch];

c.index = (c.index + 1) % c.episodes.length;
update();
}

/* RESTART */
function restartEpisode(){
update();
}

/* CONTROL */
function setMode(m){
mode = m;
override = null;
document.getElementById("mode").innerText = m.toUpperCase();
}

function force(ch){
override = ch;
mode = "manual";
update();
}

/* ENGINE (NO LOOP, NO REFRESH BUG) */
function update(){

const ch = getChannel();
const c = network[ch];

const ep = c.episodes[c.index];
const next = c.episodes[(c.index+1)%c.episodes.length];

play(ep.id);

/* UI */
document.getElementById("title").innerText =
ch.toUpperCase() + " — " + ep.t;

document.getElementById("desc").innerText = ep.d;

document.getElementById("mode").innerText = mode.toUpperCase();

}

</script>

</body>
</html>
