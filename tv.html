<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Broadcast OS v6</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

.layout{
    display:flex;
    height:100vh;
}

/* CONTROL PANEL */
.control{
    width:340px;
    background:#0a0a0a;
    border-right:1px solid #222;
    padding:10px;
}

.btn{
    width:100%;
    padding:10px;
    margin:4px 0;
    background:#1a1a1a;
    border:0;
    color:#fff;
    cursor:pointer;
}

/* VIEWER */
.viewer{
    flex:1;
    position:relative;
}

#player{
    width:100%;
    height:100%;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
}

.title{ font-size:20px; }
.sub{ font-size:13px; color:#aaa; }

/* LIVE BADGE */
.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#444;
    padding:6px 10px;
}

.badge.live{
    background:#ff2d2d;
}
</style>
</head>

<body>

<div class="layout">

<!-- CONTROL -->
<div class="control">

<h3>📡 MODE</h3>
<button class="btn" onclick="setMode('auto')">AUTO NETWORK</button>
<button class="btn" onclick="setMode('manual')">DIRECTOR MODE</button>

<h3>🎮 CHANNELS</h3>
<button class="btn" onclick="force('gaming')">Gaming Night</button>
<button class="btn" onclick="force('talk')">Talk Radio</button>
<button class="btn" onclick="force('dj')">DJ Block</button>
<button class="btn" onclick="force('mystery')">Bonded in Mystery</button>

<h3>🔴 LIVE TEST</h3>
<button class="btn" onclick="simulateLive('kick')">Kick Live</button>
<button class="btn" onclick="simulateLive('youtube')">YouTube Live</button>
<button class="btn" onclick="clearLive()">Clear Live</button>

</div>

<!-- VIEW -->
<div class="viewer">

<div class="badge" id="badge">📺 REPLAY</div>

<div class="overlay">
<div class="title" id="title">Booting CrowRules TV...</div>
<div class="sub" id="sub">Initializing broadcast engine...</div>
</div>

<div id="player"></div>

</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   STATE
========================= */

let player;
let mode = "auto";
let override = null;
let currentId = null;
let liveFeed = null;

/* =========================
   CHANNEL SYSTEM (UNCHANGED CONTENT)
========================= */

const channels = {

talk:{
index:0,
episodes:[
{id:"JkoTW5nNXLg",t:"Talk Radio #1",d:"Debut Broadcast"},
{id:"sgmxBU9y6A4",t:"Talk Radio #2",d:"Community Session"},
{id:"J3SkM_WAdLo",t:"Talk Radio #3",d:"Archive"}
]
},

gaming:{
index:0,
episodes:[
{id:"deU1Cyb8M7I",t:"Gaming Night #1",d:"Roblox Session"},
{id:"co9BYq82aNk",t:"Gaming Night #2",d:"Continuation"},
{id:"J3SkM_WAdLo",t:"Gaming Night Archive",d:"Replay Block"}
]
},

dj:{
index:0,
episodes:[
{id:"vT-BRFf2Yk0",t:"DJ Block #1",d:"Live Mix Replay"},
{id:"bo-fv8gLU1U",t:"DJ Block #2",d:"Extended Set"}
]
},

mystery:{
index:0,
episodes:[
{id:"hTWKbfoikeg",t:"Mystery Case #1",d:"Investigation"},
{id:"3fumBcKC6RE",t:"Mystery Case #2",d:"Evidence Review"}
]
}

};

/* =========================
   KICK LIVE BRIDGE
========================= */

async function checkKickLive(channel){

try{

const res = await fetch(`https://kick.com/api/v2/channels/${channel}`,{
cache:"no-store"
});

if(!res.ok) return null;

const data = await res.json();

if(data?.livestream){

return {
platform:"kick",
videoId:"kick-live",
channel
};

}

return null;

}catch(e){
console.log("Kick error:", e);
return null;
}

}

/* =========================
   LIVE AGGREGATOR
========================= */

async function checkLiveFeeds(){

const kick = await checkKickLive("CrowRules_TV");
if(kick) return kick;

return null;
}

/* =========================
   PRIORITY ENGINE
========================= */

function getState(){

// 🔴 LIVE ALWAYS WINS
if(liveFeed && liveFeed.videoId){
return {
type:"live",
platform: liveFeed.platform,
videoId: liveFeed.videoId
};
}

// 🎛 OVERRIDE
if(override){
return {
type:"replay",
ch: override
};
}

// 🕒 SCHEDULE
const h = new Date().getHours();

if(h < 12) return {type:"replay", ch:"talk"};
if(h < 16) return {type:"replay", ch:"gaming"};
if(h < 18) return {type:"replay", ch:"dj"};
return {type:"replay", ch:"mystery"};

}

/* =========================
   YOUTUBE ENGINE
========================= */

function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{
height:"100%",
width:"100%",
videoId:"",
events:{ onStateChange:onState }
});

/* LIVE POLLING (SAFE + STABLE) */
setInterval(async () => {

const result = await checkLiveFeeds();

if(JSON.stringify(result) !== JSON.stringify(liveFeed)){
liveFeed = result;
update();
}

}, 9000);

update();

}

/* =========================
   AUTO NEXT
========================= */

function onState(e){
if(e.data === 0){
next();
}
}

/* =========================
   SAFE PLAY (NO RESTART BUG)
========================= */

function play(id){

if(currentId === id) return;
currentId = id;

player.loadVideoById(id);

}

/* =========================
   NEXT EPISODE
========================= */

function next(){

const state = getState();
if(state.type === "live") return;

const c = channels[state.ch];
c.index = (c.index + 1) % c.episodes.length;

update();

}

/* =========================
   UPDATE ENGINE
========================= */

function update(){

const state = getState();

/* ================= LIVE ================= */
if(state.type === "live"){

document.getElementById("badge").innerText =
"🔴 LIVE " + state.platform.toUpperCase();

document.getElementById("badge").classList.add("live");

document.getElementById("title").innerText =
"LIVE BROADCAST — " + state.platform;

document.getElementById("sub").innerText =
"Now streaming live feed";

if(currentId !== state.videoId){
play(state.videoId);
}

return;
}

/* ================= REPLAY ================= */

document.getElementById("badge").innerText =
"📺 REPLAY";

document.getElementById("badge").classList.remove("live");

const c = channels[state.ch];
const ep = c.episodes[c.index];

document.getElementById("title").innerText =
state.ch.toUpperCase() + " — " + ep.t;

document.getElementById("sub").innerText =
ep.d;

play(ep.id);

}

/* =========================
   CONTROLS
========================= */

function setMode(m){
mode = m;
override = null;
update();
}

function force(ch){
override = ch;
update();
}

/* =========================
   LIVE TEST
========================= */

function simulateLive(platform){

liveFeed = {
platform,
videoId:"dQw4w9WgXcQ"
};

update();

}

function clearLive(){
liveFeed = null;
update();
}

</script>

</body>
</html>
