<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrowRules TV | Broadcast Engine v2.1</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:90px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:18px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    letter-spacing:2px;
}

.nav-dot{
    width:10px;height:10px;border-radius:50%;
    background:#00ffff33;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.15);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;font-weight:600}

/* CONTENT */
.content{display:flex;flex:1;}

/* PLAYER */
.player{
    flex:2;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.screen{
    width:95%;
    height:88%;
    border-radius:18px;
    border:2px solid rgba(0,255,255,0.15);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.video{flex:1;}
iframe{
    width:100%;
    height:100%;
    border:none;
    transition:opacity 0.4s ease;
}

.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.15);
}

.info h2{
    color:#00ffff;
    font-size:16px;
}

.info p{
    opacity:0.75;
    font-size:13px;
    margin-top:4px;
}

.status{
    margin-top:6px;
    font-size:11px;
    color:#888;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

button{
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.25);
    color:#00ffff;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

/* CHANNELS */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.15);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.1);
    cursor:pointer;
}

.channel.active{
    border-color:#00ffff;
}
.small{font-size:12px;opacity:0.7}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<div class="main">

<div class="topbar">
<div class="live">● LIVE BROADCAST</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<div class="player">
<div class="screen">

<div class="video">
<iframe id="video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="info">
<h2 id="title">Loading...</h2>
<p id="desc"></p>
<div class="status" id="status"></div>

<div class="controls">
<button onclick="prevVideo()">⟵ Prev</button>
<button onclick="nextVideo()">Next ⟶</button>
<button onclick="toggleShuffle()">🎲 Shuffle</button>
<button onclick="toggleAuto()">🔁 24/7 Mode</button>
</div>

</div>

</div>
</div>

<div class="channels" id="channelList"></div>

</div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* BUMPERS (UNCHANGED) */
const bumpers = [
"7wtfhZwyrcc",
"Zi_XLOBDo_Y",
"fJ9rUzIMcZQ"
];

/* =========================
   CHANNEL DATA (UNCHANGED VIDEOS)
========================= */

const channels = {
"Tacoma Nights":{
desc:"Flagship talk show",
videos:["YXcW0pN3KrE"],
index:0
},

"Talk Radio":{
desc:"Live discussion show",
videos:[
"JkoTW5nNXLg",
"sgmxBU9y6A4",
"J3SkM_WAdLo",
"uzb9N9exc7k",
"wVIMzr02YQg"
],
index:0
},

"D&J Show":{
desc:"Comedy variety",
videos:[
"vT-BRFf2Yk0",
"bo-fv8gLU1U",
"x4W80w1wCZM",
"Skdnn5cERuo",
"6wsqHTc6Rl0"
],
index:0
}
};

/* STATE */
const state = {
currentChannel:"Tacoma Nights",
auto:false,
shuffle:false,
timer:null,
plays:0
};

/* RENDER CHANNEL LIST */
function render(){
const list=document.getElementById("channelList");
list.innerHTML="";

Object.keys(channels).forEach(name=>{
const div=document.createElement("div");
div.className="channel"+(name===state.currentChannel?" active":"");

div.innerHTML=`
<b>${name}</b>
<div class="small">${channels[name].desc}</div>
`;

div.onclick=()=>switchChannel(name);
list.appendChild(div);
});
}

/* LOAD VIDEO */
function load(){

state.plays++;

const ch=channels[state.currentChannel];

/* bumper every 5 plays */
if(state.plays % 5 === 0){
playBumper();
return;
}

/* shuffle channel */
if(state.shuffle){
const keys=Object.keys(channels);
state.currentChannel=keys[Math.floor(Math.random()*keys.length)];
}

/* video */
const vid=ch.videos[ch.index];

const iframe=document.getElementById("video");
iframe.style.opacity=0;

setTimeout(()=>{
iframe.src=`https://www.youtube.com/embed/${vid}?autoplay=1&mute=1`;
iframe.style.opacity=1;
},250);

/* UI */
document.getElementById("title").innerText=state.currentChannel;
document.getElementById("desc").innerText=ch.desc;
document.getElementById("status").innerText=
state.auto ? "AUTO MODE ACTIVE (24/7)" : "MANUAL MODE";
}

/* BUMPER */
function playBumper(){
const ad=bumpers[Math.floor(Math.random()*bumpers.length)];
document.getElementById("video").src=
`https://www.youtube.com/embed/${ad}?autoplay=1&mute=1`;

setTimeout(nextVideo,6000);
}

/* CHANNEL SWITCH */
function switchChannel(name){
state.currentChannel=name;
channels[name].index=0;
render();
load();
}

/* NEXT / PREV */
function nextVideo(){
const ch=channels[state.currentChannel];
ch.index=(ch.index+1)%ch.videos.length;
load();
}

function prevVideo(){
const ch=channels[state.currentChannel];
ch.index=(ch.index-1+ch.videos.length)%ch.videos.length;
load();
}

/* AUTO MODE (FIXED CLEAN) */
function toggleAuto(){

state.auto=!state.auto;

if(state.timer){
clearInterval(state.timer);
state.timer=null;
}

if(state.auto){
state.timer=setInterval(nextVideo,12000);
}

load();
}

/* SHUFFLE */
function toggleShuffle(){
state.shuffle=!state.shuffle;
load();
}

/* INIT */
render();
switchChannel(state.currentChannel);

</script>

</body>
</html>
