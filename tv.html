<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Broadcast OS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

.layout{
    display:flex;
    height:100vh;
}

/* CONTROL ROOM */
.control{
    width:340px;
    background:#0a0a0a;
    border-right:1px solid #222;
    padding:10px;
    overflow:auto;
}

.btn{
    width:100%;
    margin:4px 0;
    padding:10px;
    background:#1a1a1a;
    border:0;
    color:#fff;
    cursor:pointer;
}

/* VIEWER */
.viewer{
    flex:1;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
}

.title{ font-size:20px; }
.sub{ font-size:13px; color:#aaa; }

.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff2d2d;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="layout">

<!-- CONTROL -->
<div class="control">

<h3>📡 Broadcast Control</h3>
<button class="btn" onclick="setMode('auto')">AUTO NETWORK</button>
<button class="btn" onclick="setMode('manual')">MANUAL OVERRIDE</button>

<h3>📺 Channels</h3>
<button class="btn" onclick="force('talk')">Talk Radio</button>
<button class="btn" onclick="force('gaming')">Game Night</button>
<button class="btn" onclick="force('dj')">DJ Block</button>
<button class="btn" onclick="force('mystery')">Mystery Hour</button>

</div>

<!-- VIEW -->
<div class="viewer">

<div class="badge">🔴 LIVE</div>

<div class="overlay">
<div class="title" id="title">Booting Broadcast OS...</div>
<div class="sub" id="sub">Initializing scheduler...</div>
</div>

<iframe id="player"></iframe>

</div>

</div>

<script>

/* =========================
   1. BROADCAST LIBRARY
========================= */

const channels = {

talk:{
index:0,
episodes:[
{id:"dQw4w9WgXcQ",t:"Talk 1",d:"Morning talk block",len:180},
{id:"kxopViU98Xo",t:"Talk 2",d:"Care stories",len:200},
{id:"3JZ_D3ELwOQ",t:"Talk 3",d:"Night reflection",len:240}
]
},

gaming:{
index:0,
episodes:[
{id:"9bZkp7q19f0",t:"Game 1",d:"Match start",len:300},
{id:"hTWKbfoikeg",t:"Game 2",d:"Mid match",len:300}
]
},

dj:{
index:0,
episodes:[
{id:"vT-BRFf2Yk0",t:"DJ 1",d:"Warmup",len:240},
{id:"bo-fv8gLU1U",t:"DJ 2",d:"Main set",len:300}
]
},

mystery:{
index:0,
episodes:[
{id:"hTWKbfoikeg",t:"Case 1",d:"Investigation",len:300},
{id:"3fumBcKC6RE",t:"Case 2",d:"Evidence",len:300}
]
}

};

/* =========================
   2. STATE ENGINE
========================= */

let mode = "auto";
let override = null;
let lastTick = Date.now();

/* =========================
   3. SCHEDULER (PLUTO STYLE)
========================= */

function schedule(){

const h = new Date().getHours();

if(override) return override;

if(h < 6) return "talk";
if(h < 12) return "talk";
if(h < 16) return "gaming";
if(h < 18) return "dj";
return "mystery";

}

/* =========================
   4. PLAYOUT ENGINE
========================= */

function advanceIfNeeded(ch){

const c = channels[ch];
const ep = c.episodes[c.index];

const now = Date.now();

if(now - lastTick > ep.len * 1000){
    c.index = (c.index + 1) % c.episodes.length;
    lastTick = now;
}

}

/* =========================
   5. RENDER ENGINE
========================= */

function render(){

const ch = schedule();
const c = channels[ch];

advanceIfNeeded(ch);

const ep = c.episodes[c.index];

document.getElementById("player").src =
`https://www.youtube.com/embed/${ep.id}?autoplay=1&mute=1`;

document.getElementById("title").innerText =
`${ch.toUpperCase()} — ${ep.t}`;

document.getElementById("sub").innerText =
ep.d;

}

/* =========================
   6. CONTROL ROOM
========================= */

function setMode(m){
mode = m;
override = null;
}

function force(ch){
override = ch;
mode = "manual";
}

setInterval(render, 4000);
render();

</script>

</body>
</html>
