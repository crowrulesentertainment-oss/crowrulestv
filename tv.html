<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrowRules TV | Broadcast Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:80px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:25px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
}

.nav-dot{width:10px;height:10px;border-radius:50%;background:#00ffff;opacity:0.5;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.2);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;}

.content{display:flex;flex:1;}

/* PLAYER */
.player{flex:2;display:flex;align-items:center;justify-content:center;background:#000;}

.screen{
    width:95%;
    height:88%;
    border-radius:20px;
    border:2px solid rgba(0,255,255,0.2);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.video{flex:1;}
iframe{width:100%;height:100%;border:none;}

.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.2);
}

.info h2{color:#00ffff;font-size:18px;}
.info p{opacity:0.8;font-size:13px;margin-top:5px;}

.controls{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    background:rgba(0,255,255,0.1);
    border:1px solid rgba(0,255,255,0.3);
    color:#00ffff;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* CHANNELS */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.2);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.15);
    cursor:pointer;
}

.channel.active{border-color:#00ffff;}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<div class="main">

<div class="topbar">
<div class="live">● LIVE</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<div class="player">

<div class="screen">

<div class="video">
<iframe id="video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div class="info">
<h2 id="title">Loading...</h2>
<p id="desc"></p>

<div class="controls">
<button onclick="prevVideo()">⟵ Prev</button>
<button onclick="nextVideo()">Next ⟶</button>
<button onclick="toggleShuffle()">🎲 Shuffle</button>
<button onclick="toggleAuto()">🔁 24/7 Mode</button>
</div>

</div>

</div>

</div>

<div class="channels" id="channelList"></div>

</div>
</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* BUMPERS (ADS) */
const bumpers = [
"7wtfhZwyrcc",
"Zi_XLOBDo_Y",
"fJ9rUzIMcZQ"
];

/* CHANNEL DATA */
const channels = {
"Tacoma Nights":{
desc:"Flagship talk show",
videos:["YXcW0pN3KrE"],
schedule:[{start:0,videos:[0,1]},{start:720,videos:[2]}],
index:0
},
"Talk Radio":{
desc:"Live discussion show",
videos:["JkoTW5nNXLg","sgmxBU9y6A4","J3SkM_WAdLo","uzb9N9exc7k","wVIMzr02YQg"],
schedule:[{start:0,videos:[0,1,2]}],
index:0
},
"D&J Show":{
desc:"Comedy variety",
videos:["vT-BRFf2Yk0","bo-fv8gLU1U","x4W80w1wCZM","Skdnn5cERuo","6wsqHTc6Rl0"],
schedule:[{start:0,videos:[0,1,2]}],
index:0
}
};

let currentChannel="Tacoma Nights";
let autoMode=false;
let shuffleMode=false;
let playCount=0;

/* RENDER */
function render(){
const c=document.getElementById("channelList");
c.innerHTML="";
Object.keys(channels).forEach(n=>{
const el=document.createElement("div");
el.className="channel"+(n===currentChannel?" active":"");
el.innerHTML=`<b>${n}</b><br><small>${channels[n].desc}</small>`;
el.onclick=()=>switchChannel(n);
c.appendChild(el);
});
}
render();

/* CHANNEL SWITCH */
function switchChannel(name){
currentChannel=name;
channels[name].index=0;
load();
render();
}

/* LOAD VIDEO */
function load(){

playCount++;

if(playCount%4===0){
playBumper();
return;
}

const ch=channels[currentChannel];

if(shuffleMode){
const vids=Object.keys(channels);
currentChannel=vids[Math.floor(Math.random()*vids.length)];
}

const vid=channels[currentChannel].videos[channels[currentChannel].index];

document.getElementById("video").src=
`https://www.youtube.com/embed/${vid}?autoplay=1&mute=1`;

document.getElementById("title")=currentChannel;
document.getElementById("desc").innerText=channels[currentChannel].desc;
}

/* BUMPER */
function playBumper(){
const ad=bumpers[Math.floor(Math.random()*bumpers.length)];
document.getElementById("video").src=
`https://www.youtube.com/embed/${ad}?autoplay=1&mute=1`;

setTimeout(()=>nextVideo(),6000);
}

/* NEXT / PREV */
function nextVideo(){
const ch=channels[currentChannel];
ch.index=(ch.index+1)%ch.videos.length;
load();
}

function prevVideo(){
const ch=channels[currentChannel];
ch.index=(ch.index-1+ch.videos.length)%ch.videos.length;
load();
}

/* AUTO MODE */
function toggleAuto(){
autoMode=!autoMode;

if(autoMode){
setInterval(()=>nextVideo(),12000);
}
}

/* SHUFFLE */
function toggleShuffle(){
shuffleMode=!shuffleMode;
load();
}

/* START */
switchChannel(currentChannel);

</script>

</body>
</html>
