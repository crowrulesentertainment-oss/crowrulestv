<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV - Network Automation System</title>

<style>
:root{
    --bg:#000;
    --accent:#00ffff;
    --live:#ff2d2d;
    --text:#fff;
    --muted:#aaa;
    --panel:#0b0b0b;
    --border:#1f1f1f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* LAYOUT */
.container{
    display:flex;
    height:100vh;
}

/* CONTROL ROOM */
.control{
    width:360px;
    background:#070707;
    border-right:1px solid var(--border);
    padding:12px;
    overflow-y:auto;
}

.section{
    background:#0c0c0c;
    border:1px solid #1a1a1a;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
}

h3{
    color:var(--accent);
    font-size:13px;
    margin-bottom:10px;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:10px;
    margin:4px 0;
    background:#1a1a1a;
    border:none;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    text-align:left;
}

.btn:hover{ background:#222; }

/* VIEWER */
.viewer{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
}

/* VIDEO */
.video{
    flex:1;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, rgba(0,0,0,.95), transparent);
    padding:20px;
}

.title{
    font-size:22px;
}

.desc{
    font-size:13px;
    color:var(--muted);
}

/* STATUS */
.status{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:8px;
}

.badge{
    padding:6px 10px;
    font-size:12px;
    border-radius:6px;
}

.live{ background:var(--live); }
.accent{ background:var(--accent); color:#000; }

/* CLOCK */
.clock{
    position:absolute;
    top:10px;
    right:10px;
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- CONTROL ROOM -->
<div class="control">

<div class="section">
<h3>📡 NETWORK STATUS</h3>
<button class="btn" onclick="setMode('auto')">🤖 AUTO NETWORK</button>
<button class="btn" onclick="setMode('manual')">🎛 DIRECTOR OVERRIDE</button>
</div>

<div class="section">
<h3>📺 CHANNEL FORCE</h3>
<button class="btn" onclick="force('talk')">🎙 Talk Radio</button>
<button class="btn" onclick="force('gaming')">🎮 Game Night</button>
<button class="btn" onclick="force('dj')">🎧 DJ Block</button>
<button class="btn" onclick="force('mystery')">🕵 Mystery</button>
<button class="btn" onclick="force('tacoma')">🌃 Tacoma</button>
</div>

<div class="section">
<h3>🎬 EMERGENCY</h3>
<button class="btn" onclick="skipEpisode()">⏭ Skip Episode</button>
<button class="btn" onclick="restartEpisode()">🔁 Restart Episode</button>
</div>

</div>

<!-- VIEWER -->
<div class="viewer">

<div class="status">
<div class="badge live">🔴 LIVE</div>
<div class="badge accent" id="mode">AUTO</div>
</div>

<div class="clock" id="clock"></div>

<div class="video">
<iframe id="player" allowfullscreen></iframe>
</div>

<div class="overlay">
<div class="title" id="title">Booting Network...</div>
<div class="desc" id="desc">Initializing broadcast engine</div>
</div>

</div>

</div>

<script>

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles"});
},1000);

/* STATE */
let mode = "auto";
let overrideChannel = null;

/* VIDEO BUILDER */
function vid(id){
return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0`;
}

/* CHANNEL DATABASE */
const network = {

talk:{
index:0,
episodes:[
{t:"Morning Talk",d:"Daily conversations",id:"dQw4w9WgXcQ",len:180},
{t:"Care Stories",d:"Life experiences",id:"kxopViU98Xo",len:200},
{t:"Night Talk",d:"Late reflections",id:"3JZ_D3ELwOQ",len:240}
]
},

gaming:{
index:0,
episodes:[
{t:"Game Start",d:"Opening chaos",id:"9bZkp7q19f0",len:300},
{t:"Mid Match",d:"Competitive play",id:"hTWKbfoikeg",len:300},
{t:"Final Round",d:"Endgame",id:"fJ9rUzIMcZQ",len:300}
]
},

dj:{
index:0,
episodes:[
{t:"D&J Show #1",d:"First Episode",id:"vT-BRFf2Yk0",len:654},
{t:"D&J Show #2",d:"Second Episode",id:"bo-fv8gLU1U",len:1129}
]
},

mystery:{
index:0,
episodes:[
{t:"Case 1",d:"Investigation begins",id:"hTWKbfoikeg",len:300},
{t:"Case 2",d:"Evidence review",id:"3fumBcKC6RE",len:300}
]
},

tacoma:{
index:0,
episodes:[
{t:"Rain City",d:"Atmosphere",id:"YQHsXMglC9A",len:300},
{t:"Night Drive",d:"Cinematic travel",id:"kXYiU_JCYtU",len:300}
]
}

};

/* SCHEDULE ENGINE */
function getChannel(){

const h = new Date().getHours();

if(overrideChannel) return overrideChannel;

if(h < 6) return "talk";
if(h < 12) return "talk";
if(h < 16) return "gaming";
if(h < 18) return "dj";
if(h < 22) return "mystery";
return "talk";

}

/* AUTO ADVANCE ENGINE */
let lastSwitch = Date.now();

function advanceIfNeeded(ch){

const c = network[ch];
const ep = c.episodes[c.index];

const now = Date.now();

/* simulate episode completion */
if(now - lastSwitch > ep.len * 1000){

c.index = (c.index + 1) % c.episodes.length;
lastSwitch = now;

}

}

/* MAIN ENGINE */
function update(){

const ch = getChannel();
const c = network[ch];

advanceIfNeeded(ch);

const ep = c.episodes[c.index];
const next = c.episodes[(c.index+1)%c.episodes.length];

document.getElementById("player").src = vid(ep.id);

document.getElementById("title").innerText =
ch.toUpperCase() + " — " + ep.t;

document.getElementById("desc").innerText = ep.d;

document.getElementById("mode").innerText = mode.toUpperCase();

}

/* CONTROL */
function setMode(m){
mode = m;
overrideChannel = null;
document.getElementById("mode").innerText = m.toUpperCase();
}

function force(ch){
overrideChannel = ch;
mode = "manual";
}

function skipEpisode(){
const ch = getChannel();
network[ch].index++;
update();
}

function restartEpisode(){
update();
}

/* START LOOP */
update();
setInterval(update, 5000);

</script>

</body>
</html>
