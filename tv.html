<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules TV | Broadcast Engine v3.0</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:90px;
    background:#050505;
    border-right:1px solid rgba(0,255,255,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    gap:18px;
}

.logo{
    font-family:'Orbitron';
    font-size:12px;
    color:#00ffff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    letter-spacing:2px;
}

.nav-dot{
    width:10px;height:10px;border-radius:50%;
    background:#00ffff33;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#050505;
    border-bottom:1px solid rgba(0,255,255,0.15);
}

.live{color:#ff3b3b;font-weight:bold;}
.clock{color:#00ff66;font-weight:600}

/* CONTENT */
.content{display:flex;flex:1;}

/* PLAYER */
.player{
    flex:2;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.screen{
    width:95%;
    height:88%;
    border-radius:18px;
    border:2px solid rgba(0,255,255,0.15);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.video{flex:1;}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* INFO */
.info{
    padding:12px;
    background:rgba(10,10,10,0.95);
    border-top:1px solid rgba(0,255,255,0.15);
}

.info h2{
    color:#00ffff;
    font-size:16px;
}

.info p{
    opacity:0.75;
    font-size:13px;
    margin-top:4px;
}

.status{
    margin-top:6px;
    font-size:11px;
    color:#888;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

button{
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.25);
    color:#00ffff;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

/* CHANNEL LIST */
.channels{
    flex:1;
    background:#070707;
    border-left:1px solid rgba(0,255,255,0.15);
    overflow-y:auto;
    padding:10px;
}

.channel{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.1);
    cursor:pointer;
}

.channel.active{
    border-color:#00ffff;
}

.small{font-size:12px;opacity:0.7}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">CROWRULES TV</div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
<div class="nav-dot"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="live">● LIVE BROADCAST</div>
<div class="clock" id="clock"></div>
</div>

<div class="content">

<!-- PLAYER -->
<div class="player">
<div class="screen">

<div class="video">
<iframe id="video"></iframe>
</div>

<div class="info">
<h2 id="title">Loading...</h2>
<p id="desc"></p>
<div class="status" id="status"></div>

<div class="controls">
<button onclick="prev()">⟵ Prev</button>
<button onclick="next()">Next ⟶</button>
<button onclick="toggleShuffle()">🎲 Shuffle</button>
<button onclick="toggleAuto()">🔁 Auto</button>
</div>

</div>

</div>
</div>

<!-- CHANNELS -->
<div class="channels" id="channels"></div>

</div>
</div>

<script>

/* ================= CLOCK ================= */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* ================= BUMPERS ================= */
const bumpers = [
"7wtfhZwyrcc",
"Zi_XLOBDo_Y",
"fJ9rUzIMcZQ"
];

/* ================= CHANNEL DATA ================= */
const data = {
"Tacoma Nights":{
desc:"Flagship talk show",
videos:["YXcW0pN3KrE"],
i:0
},
"Talk Radio":{
desc:"Live discussion show",
videos:[
"JkoTW5nNXLg","sgmxBU9y6A4","J3SkM_WAdLo","uzb9N9exc7k","wVIMzr02YQg"
],
i:0
},
"D&J Show":{
desc:"Comedy variety",
videos:[
"vT-BRFf2Yk0","bo-fv8gLU1U","x4W80w1wCZM","Skdnn5cERuo","6wsqHTc6Rl0"
],
i:0
}
};

/* ================= STATE ================= */
const state = {
channel:"Tacoma Nights",
shuffle:false,
auto:true
};

/* ================= RENDER CHANNELS ================= */
function renderChannels(){
const box = document.getElementById("channels");
box.innerHTML="";

Object.keys(data).forEach(name=>{
const el = document.createElement("div");
el.className = "channel" + (name===state.channel ? " active":"");

el.innerHTML = `
<b>${name}</b>
<div class="small">${data[name].desc}</div>
`;

el.onclick = ()=>setChannel(name);
box.appendChild(el);
});
}

/* ================= LOAD VIDEO ================= */
function load(){

const ch = data[state.channel];
const id = ch.videos[ch.i];

document.getElementById("video").src =
`https://www.youtube.com/embed/${id}?enablejsapi=1&autoplay=1&mute=1`;

document.getElementById("title").innerText = state.channel;
document.getElementById("desc").innerText = ch.desc;

document.getElementById("status").innerText =
state.auto ? "AUTO MODE: ON (ENDLESS PLAYBACK)" : "MANUAL MODE";

renderChannels();
}

/* ================= NEXT / PREV ================= */
function next(){
const ch = data[state.channel];
ch.i = (ch.i + 1) % ch.videos.length;
load();
}

function prev(){
const ch = data[state.channel];
ch.i = (ch.i - 1 + ch.videos.length) % ch.videos.length;
load();
}

/* ================= CHANNEL SWITCH ================= */
function setChannel(name){
state.channel = name;
data[name].i = 0;
load();
}

/* ================= OPTIONS ================= */
function toggleShuffle(){
state.shuffle = !state.shuffle;
}

function toggleAuto(){
state.auto = !state.auto;
document.getElementById("status").innerText =
state.auto ? "AUTO MODE: ON" : "MANUAL MODE";
}

/* ================= YOUTUBE API ================= */
let player;

function onYouTubeIframeAPIReady(){
player = new YT.Player('video', {
events:{
'onStateChange':onStateChange
}
});
}

function onStateChange(e){

if(e.data === YT.PlayerState.ENDED){

/* optional bumper */
if(state.shuffle && Math.random() < 0.15){
playBumper();
return;
}

next();
}
}

/* ================= BUMPER ================= */
function playBumper(){
const id = bumpers[Math.floor(Math.random()*bumpers.length)];

document.getElementById("video").src =
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

setTimeout(next, 5000);
}

/* ================= INIT ================= */
renderChannels();
setChannel(state.channel);

</script>

<script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
